version: v2
modules:
  - path: proto
lint:
  use:
    - DEFAULT
  except:
    - PACKAGE_VERSION_SUFFIX
    # Pre-existing lint debt (predates task-069) — excepted so the lint gate runs for every OTHER
    # rule rather than being disabled wholesale. FOLLOW-UP (task-069 backlog, owner: Platform Lead):
    # fix and remove each of these so the full DEFAULT set is enforced:
    #   ENUM_VALUE_PREFIX          — *Proto enums lack the SCREAMING_SNAKE enum-name prefix
    #   PACKAGE_SAME_GO_PACKAGE    — go_package option drift across the package
    #   RPC_RESPONSE_STANDARD_NAME — non-standard response message names
    #   RPC_REQUEST_STANDARD_NAME  — MediaService.UploadMedia uses a client-streaming chunk type
    #                                (UploadMediaChunk), semantically correct but not *Request-named
    - ENUM_VALUE_PREFIX
    - PACKAGE_SAME_GO_PACKAGE
    - RPC_RESPONSE_STANDARD_NAME
    - RPC_REQUEST_STANDARD_NAME
breaking:
  use:
    - FILE
  # TEMPORARY (task-091 follow-up): last_counted_message_id type unified string→Uuid in ChatReadPayload
  # + ChatListItemProto to match MarkReadResponse / GetChatUnreadResponse / ChatUnreadEntryProto. The
  # field was added in v1.4.0 with NO installed consumers (mobile-and-34 not yet implemented), so this is
  # a sanctioned pre-launch break. REMOVE this ignore once the Uuid release merges to main (main becomes
  # the new strict baseline) — mirrors the task-069 A.6 temporary-ignore pattern below.
  ignore_only:
    FIELD_SAME_TYPE:
      - proto/sapp/events/v1/chat_events.proto
      - proto/sapp/messaging/v1/messaging_service.proto
    FIELD_SAME_CARDINALITY:
      - proto/sapp/events/v1/chat_events.proto
      - proto/sapp/messaging/v1/messaging_service.proto
  # task-069 A.6 follow-up COMPLETE: the v1.0.12 parity release (MarkReadResponse reshape,
  # string→Uuid promotions, java_package grpc-infix removal, Profile .Grpc→.V1, explicit namespace
  # options) is merged to main, so main is now the baseline. The temporary breaking.ignore is removed
  # — the gate is strict again: future PRs are compared against the sanctioned v1.0.12 contract.
