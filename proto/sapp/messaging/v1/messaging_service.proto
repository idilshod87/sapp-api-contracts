syntax = "proto3";

package sapp.messaging.v1;

import "google/protobuf/timestamp.proto";
import "sapp/common/v1/common.proto"; // PageInfo retained: used by GetHistoryResponse (task-049 §A.3 audit: GetChatsResponse migrated to string next_page_token)
import "sapp/messaging/v1/message.proto";
import "sapp/messaging/v1/message_content.proto";

option csharp_namespace = "Sapp.Messaging.V1";
option java_multiple_files = true;
option java_outer_classname = "MessagingServiceProto";
option java_package = "com.sapp.messaging.v1";

// ── Enums ─────────────────────────────────────────────────────────────────────

enum MessageType {
  MESSAGE_TYPE_UNSPECIFIED = 0;
  MESSAGE_TYPE_TEXT = 1;
  MESSAGE_TYPE_IMAGE = 2;
  MESSAGE_TYPE_VIDEO = 3;
  MESSAGE_TYPE_AUDIO = 4;
  MESSAGE_TYPE_FILE = 5;
  MESSAGE_TYPE_STICKER = 6;
  MESSAGE_TYPE_SYSTEM = 7;
}

enum MessageStatus {
  MESSAGE_STATUS_UNSPECIFIED = 0;
  MESSAGE_STATUS_SENDING = 1;
  MESSAGE_STATUS_SENT = 2;
  MESSAGE_STATUS_DELIVERED = 3;
  MESSAGE_STATUS_READ = 4;
  MESSAGE_STATUS_FAILED = 5;
}

// task-050: chat type discriminator
enum ChatType {
  CHAT_TYPE_UNSPECIFIED = 0;
  CHAT_TYPE_PRIVATE = 1;
  CHAT_TYPE_GROUP = 2;
  CHAT_TYPE_CHANNEL = 3;
}

// task-050: Phase 1 — MAIN / ARCHIVE. Phase 2 — FOLDER + folder_id.
enum ChatListType {
  CHAT_LIST_TYPE_UNSPECIFIED = 0;
  CHAT_LIST_TYPE_MAIN = 1;
  CHAT_LIST_TYPE_ARCHIVE = 2;
  CHAT_LIST_TYPE_FOLDER = 3;
}

// task-050: client-side localization of last-message preview.
// TEXT type → render text directly; other types → localize label (e.g. "📷 Фото").
enum MessageContentType {
  MESSAGE_CONTENT_TYPE_UNSPECIFIED = 0;
  MESSAGE_CONTENT_TYPE_TEXT = 1;
  MESSAGE_CONTENT_TYPE_IMAGE = 2;
  MESSAGE_CONTENT_TYPE_VIDEO = 3;
  MESSAGE_CONTENT_TYPE_DOCUMENT = 4;
  MESSAGE_CONTENT_TYPE_VOICE = 5;
  MESSAGE_CONTENT_TYPE_STICKER = 6;
  reserved 7 to 19;
}

// ── Domain objects ────────────────────────────────────────────────────────────

message MessageDto {
  string message_id = 1;
  string chat_id = 2;
  string sender_id = 3;
  MessageType type = 4;
  string text = 5;
  string media_id = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp edited_at = 8;
  bool is_deleted = 9;
  string reply_to_message_id = 10;
  string client_message_id = 11;
  int64 pts = 12;
}

// task-050: sort-order per chat list.
// order encoding: pinned = Int64.MaxValue - pin_rank; normal = last_message_at_unix_ms
message ChatPosition {
  ChatListType list_type = 1;
  int32 folder_id = 2; // only for CHAT_LIST_TYPE_FOLDER (Phase 2)
  int64 order = 3;
  bool is_pinned = 4;
}

// task-050: Phase 1 preview fields sufficient for ChatList without extra RPCs.
// task-067: renamed from MessageProto → MessagePreviewProto to free up the name
//           for the canonical full message type in message.proto.
// Fields 8-20 reserved for DirectChat extension (reply_to, media, reactions).
message MessagePreviewProto {
  string message_id = 1;
  string sender_id = 2;
  string sender_display_name = 3; // server-computed from user_profile_snapshots
  string text = 4;
  MessageContentType content_type = 5;
  int64 sent_at_unix_ms = 6;
  bool is_outgoing = 7; // server-computed: sender_id == requesting_user_id
  reserved 8 to 20;
  string text_preview = 21; // task-069: server-rendered preview text
  bool is_deleted = 22; // task-069: tombstone marker for deleted last message
}

// task-050: replaces old ChatDto in GetChatsResponse.
message ChatListItemProto {
  string chat_id = 1;
  ChatType chat_type = 2;
  string title = 3; // for PRIVATE = peer display_name (server-computed)
  string avatar_url = 4; // CDN URL; empty string if no avatar
  MessagePreviewProto last_message = 5; // absent for new chat with no messages
  int32 unread_count = 6;
  repeated ChatPosition positions = 7; // Phase 1: 1 element
  bool is_muted = 8;
  string peer_user_id = 9; // task-069: PRIVATE only; empty for GROUP/CHANNEL
}

// ── SendMessage ───────────────────────────────────────────────────────────────
// task-067 / ADR-0049: SendMessageRequest now uses typed MessageContent oneof.
// Flat fields (text, media_id, ClientMediaSnapshot, reply_to_message_id) removed.

message SendMessageRequest {
  string chat_id = 1;
  string client_message_id = 2;
  sapp.messaging.v1.MessageContent content = 3;
  optional sapp.messaging.v1.ReplyTo reply_to = 4;
  reserved 5, 6, 8, 9; // were: reply_to_message_id, quoted_text, media_id, media_snapshot
}

message SendMessageResponse {
  string message_id = 1;
  bool replayed = 2;
  int64 sent_at_unix_ms = 3;
}

// ── GetChatHistory ────────────────────────────────────────────────────────────

message GetChatHistoryRequest {
  string chat_id = 1;
  string before_message_id = 2;
  int32 limit = 3;
}

// task-067: GetChatHistory now returns canonical MessageProto (ADR-0049).
message GetChatHistoryResponse {
  repeated sapp.messaging.v1.MessageProto messages = 1;
  bool has_more = 2;
}

// ── EditMessageText ──────────────────────────────────────────────────────────

message EditMessageTextRequest {
  string chat_id = 1;
  string message_id = 2;
  string text = 3;
  repeated TextEntityProto entities = 4; // task-069
  string quoted_text = 5; // task-069
}

message EditMessageTextResponse {
  string message_id = 1;
  int64 edited_at_unix_ms = 2;
  bool updated = 3;
}

// ── DeleteMessage ─────────────────────────────────────────────────────────────

message DeleteMessageRequest {
  string message_id = 1;
  bool for_everyone = 2;
}

message DeleteMessageResponse {
  bool success = 1;
}

// ── MarkRead ──────────────────────────────────────────────────────────────────

// task-069 / ADR-0051: aligned to server surface. Field 2 renamed up_to_message_id →
// last_read_message_id; ids promoted string → Uuid (ADR-0049).
message MarkReadRequest {
  sapp.common.v1.Uuid chat_id = 1;
  sapp.common.v1.Uuid last_read_message_id = 2;
}

// task-069 / ADR-0051: contract adopts the rich server MarkReadResponse.
// BREAKING vs task-053 (unread_count moved field 1 → 5). Sanctioned breaking
// change, pre-launch (no installed clients); see ADR-0051 / buf.yaml breaking ignore.
message MarkReadResponse {
  sapp.common.v1.Uuid chat_id = 1;
  sapp.common.v1.Uuid last_read_message_id = 2;
  int64 read_at_unix_ms = 3;
  bool updated = 4;
  int32 unread_count = 5; // exact count after MarkRead; 0 = all read
}

// ── GetChats ──────────────────────────────────────────────────────────────────

enum ChatFilter {
  CHAT_FILTER_UNSPECIFIED = 0; // default — treated as MAIN by server
  CHAT_FILTER_MAIN = 1;
  CHAT_FILTER_ARCHIVE = 2;
}

message GetChatsRequest {
  int32 page_size = 1; // safe rename: same field number, same wire type as former `limit`
  string page_token = 2; // safe rename: same field number, same wire type as former `cursor`
  ChatFilter filter = 3; // new field; proto3 default = CHAT_FILTER_UNSPECIFIED → backward-compatible
}

message GetChatsResponse {
  repeated ChatListItemProto chats = 1; // task-050: ChatDto → ChatListItemProto (pre-production breaking change)
  string next_page_token = 2;
}

// ── Sync (server-streaming) ───────────────────────────────────────────────────

message SyncRequest {
  int64 since_pts = 1;
}

message SyncEvent {
  oneof event {
    MessageDto new_message = 1;
    MessageDto edited_message = 2;
    DeletedMessageEvent deleted_message = 3;
    ChatListItemProto chat_updated = 4; // task-050: ChatDto replaced with ChatListItemProto
    ReadReceiptEvent read_receipt = 5;
  }
  int64 pts = 6;
}

message DeletedMessageEvent {
  string message_id = 1;
  string chat_id = 2;
  bool for_everyone = 3;
}

message ReadReceiptEvent {
  string chat_id = 1;
  string reader_id = 2;
  string up_to_message_id = 3;
  google.protobuf.Timestamp read_at = 4;
}

// ── CreateDirectChat ──────────────────────────────────────────────────────────

message CreateDirectChatRequest {
  string peer_user_id = 1;
}

message CreateDirectChatResponse {
  string chat_id = 1;
  bool already_existed = 2;
}

// ── GetChat ───────────────────────────────────────────────────────────────────

// task-051: full chat metadata for the chat detail screen.
// Fields 7, 10, 12, 16 reserved — see comments.
message ChatDetailProto {
  string chat_id = 1;
  ChatType chat_type = 2;
  string title = 3; // PRIVATE: peer display_name; fallback "Unknown"
  string avatar_url = 4; // CDN URL; empty for GROUP/CHANNEL Phase 1
  string description = 5; // empty for Phase 1 (no DB column yet)
  int32 member_count = 6; // GROUP/CHANNEL only; 0 for DM
  reserved 7; // was unread_count — client reads from ChatListItemProto
  string last_read_inbox_message_id = 8; // scroll-to-unread anchor; empty = no read state yet
  // PRIVATE/GROUP: true for active members (left_at IS NULL).
  // CHANNEL: aggregate posting authority — true only for Creator || (Admin && can_post_messages).
  // Mirrors SendMessage guard / Telegram canPostMessages(); granular source is
  // AdminRightsProto.can_post_messages (task-089).
  bool can_send_messages = 9;
  reserved 10; // was is_pinned — client reads positions[0].is_pinned
  bool is_muted = 11; // notification suppression; from chat_members.is_muted
  reserved 12; // was is_archived — client reads positions[i].list_type
  string peer_user_id = 13; // PRIVATE only; empty for GROUP/CHANNEL
  string draft_text = 14; // empty = no draft
  string draft_reply_to_message_id = 15; // empty = top-level draft
  reserved 16; // was last_message — client calls GetHistory
  // Phase 1: 1 element (MAIN or ARCHIVE).
  // NOTE for mobile: positions[0].order is always 0 in GetChatResponse — do NOT use it to update
  // ChatList sort-order cache (authoritative only from GetChatsResponse).
  repeated ChatPosition positions = 17;
  // CHANNEL only: whether the author's name is shown under each post (signing).
  // PRIVATE/GROUP: always false. Matches ChatUpdatedPayload.signing_enabled (task-089).
  bool signing_enabled = 18;
}

message GetChatRequest {
  string chat_id = 1;
}

message GetChatResponse {
  ChatDetailProto chat = 1;
}

