syntax = "proto3";

package sapp.messaging.v1;

option java_package = "com.sapp.grpc.messaging.v1";
option java_multiple_files = true;
option java_outer_classname = "MessagingServiceProto";

import "google/protobuf/timestamp.proto";
import "sapp/common/v1/common.proto";  // PageInfo retained: used by GetHistoryResponse (task-049 §A.3 audit: GetChatsResponse migrated to string next_page_token)

// ── Enums ─────────────────────────────────────────────────────────────────────

enum MessageType {
  MESSAGE_TYPE_UNSPECIFIED = 0;
  MESSAGE_TYPE_TEXT = 1;
  MESSAGE_TYPE_IMAGE = 2;
  MESSAGE_TYPE_VIDEO = 3;
  MESSAGE_TYPE_AUDIO = 4;
  MESSAGE_TYPE_FILE = 5;
  MESSAGE_TYPE_STICKER = 6;
  MESSAGE_TYPE_SYSTEM = 7;
}

enum MessageStatus {
  MESSAGE_STATUS_UNSPECIFIED = 0;
  MESSAGE_STATUS_SENDING = 1;
  MESSAGE_STATUS_SENT = 2;
  MESSAGE_STATUS_DELIVERED = 3;
  MESSAGE_STATUS_READ = 4;
  MESSAGE_STATUS_FAILED = 5;
}

// task-050: chat type discriminator
enum ChatType {
  CHAT_TYPE_UNSPECIFIED = 0;
  CHAT_TYPE_PRIVATE     = 1;
  CHAT_TYPE_GROUP       = 2;
  CHAT_TYPE_CHANNEL     = 3;
}

// task-050: Phase 1 — MAIN / ARCHIVE. Phase 2 — FOLDER + folder_id.
enum ChatListType {
  CHAT_LIST_TYPE_UNSPECIFIED = 0;
  CHAT_LIST_TYPE_MAIN        = 1;
  CHAT_LIST_TYPE_ARCHIVE     = 2;
  CHAT_LIST_TYPE_FOLDER      = 3;
}

// task-050: client-side localization of last-message preview.
// TEXT type → render text directly; other types → localize label (e.g. "📷 Фото").
enum MessageContentType {
  MESSAGE_CONTENT_TYPE_UNSPECIFIED = 0;
  MESSAGE_CONTENT_TYPE_TEXT        = 1;
  MESSAGE_CONTENT_TYPE_IMAGE       = 2;
  MESSAGE_CONTENT_TYPE_VIDEO       = 3;
  MESSAGE_CONTENT_TYPE_DOCUMENT    = 4;
  MESSAGE_CONTENT_TYPE_VOICE       = 5;
  MESSAGE_CONTENT_TYPE_STICKER     = 6;
  reserved 7 to 19;
}

// ── Domain objects ────────────────────────────────────────────────────────────

message MessageDto {
  string message_id = 1;
  string chat_id = 2;
  string sender_id = 3;
  MessageType type = 4;
  string text = 5;
  string media_id = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp edited_at = 8;
  bool is_deleted = 9;
  string reply_to_message_id = 10;
  string client_message_id = 11;
  int64 pts = 12;
}

// task-050: sort-order per chat list.
// order encoding: pinned = Int64.MaxValue - pin_rank; normal = last_message_at_unix_ms
message ChatPosition {
  ChatListType list_type = 1;
  int32        folder_id = 2;   // only for CHAT_LIST_TYPE_FOLDER (Phase 2)
  int64        order     = 3;
  bool         is_pinned = 4;
}

// task-050: Phase 1 preview fields sufficient for ChatList without extra RPCs.
// Fields 8-20 reserved for DirectChat extension (reply_to, media, reactions).
message MessageProto {
  string             message_id          = 1;
  string             sender_id           = 2;
  string             sender_display_name = 3;   // server-computed from user_profile_snapshots
  string             text                = 4;
  MessageContentType content_type        = 5;
  int64              sent_at_unix_ms     = 6;
  bool               is_outgoing         = 7;   // server-computed: sender_id == requesting_user_id
  reserved 8 to 20;
}

// task-050: replaces old ChatDto in GetChatsResponse.
message ChatListItemProto {
  string       chat_id      = 1;
  ChatType     chat_type    = 2;
  string       title        = 3;   // for PRIVATE = peer display_name (server-computed)
  string       avatar_url   = 4;   // CDN URL; empty string if no avatar
  MessageProto last_message = 5;   // absent for new chat with no messages
  int32                 unread_count = 6;
  repeated ChatPosition positions    = 7;   // Phase 1: 1 element
  bool                  is_muted     = 8;
}

// ── SendMessage ───────────────────────────────────────────────────────────────

message SendMessageRequest {
  string chat_id = 1;
  MessageType type = 2;
  string text = 3;
  string media_id = 4;
  string reply_to_message_id = 5;
  string client_message_id = 6;
}

message SendMessageResponse {
  MessageDto message = 1;
}

// ── GetHistory ────────────────────────────────────────────────────────────────

message GetHistoryRequest {
  string chat_id           = 1;
  int32  limit             = 2;   // adr-0042-ok: pre-existing exception; cleanup tracked post-task-049 (§Out of scope)
  string before_message_id = 3;
}

message GetHistoryResponse {
  repeated MessageDto messages = 1;
  sapp.common.v1.PageInfo page_info = 2;
}

// ── EditMessage ───────────────────────────────────────────────────────────────

message EditMessageRequest {
  string message_id = 1;
  string text = 2;
}

message EditMessageResponse {
  MessageDto message = 1;
}

// ── DeleteMessage ─────────────────────────────────────────────────────────────

message DeleteMessageRequest {
  string message_id = 1;
  bool for_everyone = 2;
}

message DeleteMessageResponse {
  bool success = 1;
}

// ── MarkRead ──────────────────────────────────────────────────────────────────

message MarkReadRequest {
  string chat_id = 1;
  string up_to_message_id = 2;
}

message MarkReadResponse {
  bool success = 1;
}

// ── GetChats ──────────────────────────────────────────────────────────────────

enum ChatFilter {
  CHAT_FILTER_UNSPECIFIED = 0;   // default — treated as MAIN by server
  CHAT_FILTER_MAIN        = 1;
  CHAT_FILTER_ARCHIVE     = 2;
}

message GetChatsRequest {
  int32      page_size  = 1;   // safe rename: same field number, same wire type as former `limit`
  string     page_token = 2;   // safe rename: same field number, same wire type as former `cursor`
  ChatFilter filter     = 3;   // new field; proto3 default = CHAT_FILTER_UNSPECIFIED → backward-compatible
}

message GetChatsResponse {
  repeated ChatListItemProto chats = 1;   // task-050: ChatDto → ChatListItemProto (pre-production breaking change)
  string             next_page_token = 2;
}

// ── Sync (server-streaming) ───────────────────────────────────────────────────

message SyncRequest {
  int64 since_pts = 1;
}

message SyncEvent {
  oneof event {
    MessageDto       new_message      = 1;
    MessageDto       edited_message   = 2;
    DeletedMessageEvent deleted_message = 3;
    ChatListItemProto   chat_updated  = 4;   // task-050: ChatDto replaced with ChatListItemProto
    ReadReceiptEvent  read_receipt    = 5;
  }
  int64 pts = 6;
}

message DeletedMessageEvent {
  string message_id = 1;
  string chat_id = 2;
  bool for_everyone = 3;
}

message ReadReceiptEvent {
  string chat_id = 1;
  string reader_id = 2;
  string up_to_message_id = 3;
  google.protobuf.Timestamp read_at = 4;
}

// ── CreateDirectChat ──────────────────────────────────────────────────────────

message CreateDirectChatRequest {
  string peer_user_id = 1;
}

message CreateDirectChatResponse {
  string chat_id        = 1;
  bool   already_existed = 2;
}

// ── GetChat ───────────────────────────────────────────────────────────────────

// task-051: full chat metadata for the chat detail screen.
// Fields 7, 10, 12, 16 reserved — see comments.
message ChatDetailProto {
  string       chat_id                    = 1;
  ChatType     chat_type                  = 2;
  string       title                      = 3;   // PRIVATE: peer display_name; fallback "Unknown"
  string       avatar_url                 = 4;   // CDN URL; empty for GROUP/CHANNEL Phase 1
  string       description                = 5;   // empty for Phase 1 (no DB column yet)
  int32        member_count               = 6;   // GROUP/CHANNEL only; 0 for DM
  reserved     7;                                // was unread_count — client reads from ChatListItemProto
  string       last_read_inbox_message_id = 8;   // scroll-to-unread anchor; empty = no read state yet
  bool         can_send_messages          = 9;   // Phase 1: true for active members (left_at IS NULL)
  reserved     10;                               // was is_pinned — client reads positions[0].is_pinned
  bool         is_muted                   = 11;  // notification suppression; from chat_members.is_muted
  reserved     12;                               // was is_archived — client reads positions[i].list_type
  string       peer_user_id               = 13;  // PRIVATE only; empty for GROUP/CHANNEL
  string       draft_text                 = 14;  // empty = no draft
  string       draft_reply_to_message_id  = 15;  // empty = top-level draft
  reserved     16;                               // was last_message — client calls GetHistory
  // Phase 1: 1 element (MAIN or ARCHIVE).
  // NOTE for mobile: positions[0].order is always 0 in GetChatResponse — do NOT use it to update
  // ChatList sort-order cache (authoritative only from GetChatsResponse).
  repeated ChatPosition positions         = 17;
}

message GetChatRequest {
  string chat_id = 1;
}

message GetChatResponse {
  ChatDetailProto chat = 1;
}

// task-051: lifecycle RPCs (Phase 1 stubs promoted to real handlers in task-052)
message OpenChatRequest  { string chat_id = 1; }
message OpenChatResponse {}

message CloseChatRequest  { string chat_id = 1; }
message CloseChatResponse {}

// ── task-052: Chat Action RPCs ────────────────────────────────────────────────

message PinChatRequest   { string chat_id = 1; }
message PinChatResponse  {}

message UnpinChatRequest  { string chat_id = 1; }
message UnpinChatResponse {}

message ArchiveChatRequest  { string chat_id = 1; }
message ArchiveChatResponse {}

message UnarchiveChatRequest  { string chat_id = 1; }
message UnarchiveChatResponse {}

message MuteChatRequest   { string chat_id = 1; }  // Phase 1: permanent mute
message MuteChatResponse  {}

message UnmuteChatRequest  { string chat_id = 1; }
message UnmuteChatResponse {}

message SetDraftRequest  {
  string chat_id    = 1;
  string draft_text = 2;  // max 4096 chars (application-layer validation)
}
message SetDraftResponse {}

message ClearDraftRequest  { string chat_id = 1; }
message ClearDraftResponse {}

message DeletePrivateChatRequest  { string chat_id = 1; }
message DeletePrivateChatResponse {}

message ClearPrivateChatHistoryRequest  { string chat_id = 1; }
message ClearPrivateChatHistoryResponse {}

// ── MessagingService ──────────────────────────────────────────────────────────

service MessagingService {
  rpc SendMessage(SendMessageRequest) returns (SendMessageResponse);
  rpc GetHistory(GetHistoryRequest) returns (GetHistoryResponse);
  rpc EditMessage(EditMessageRequest) returns (EditMessageResponse);
  rpc DeleteMessage(DeleteMessageRequest) returns (DeleteMessageResponse);
  rpc MarkRead(MarkReadRequest) returns (MarkReadResponse);
  rpc GetChats(GetChatsRequest) returns (GetChatsResponse);
  rpc Sync(SyncRequest) returns (stream SyncEvent);
  rpc CreateDirectChat(CreateDirectChatRequest) returns (CreateDirectChatResponse);
  rpc GetChat(GetChatRequest)         returns (GetChatResponse);
  rpc OpenChat(OpenChatRequest)       returns (OpenChatResponse);
  rpc CloseChat(CloseChatRequest)     returns (CloseChatResponse);
  // task-052: Chat action RPCs
  rpc PinChat(PinChatRequest)         returns (PinChatResponse);
  rpc UnpinChat(UnpinChatRequest)     returns (UnpinChatResponse);
  rpc ArchiveChat(ArchiveChatRequest) returns (ArchiveChatResponse);
  rpc UnarchiveChat(UnarchiveChatRequest) returns (UnarchiveChatResponse);
  rpc MuteChat(MuteChatRequest)       returns (MuteChatResponse);
  rpc UnmuteChat(UnmuteChatRequest)   returns (UnmuteChatResponse);
  rpc SetDraft(SetDraftRequest)       returns (SetDraftResponse);
  rpc ClearDraft(ClearDraftRequest)   returns (ClearDraftResponse);
  rpc DeletePrivateChat(DeletePrivateChatRequest)           returns (DeletePrivateChatResponse);
  rpc ClearPrivateChatHistory(ClearPrivateChatHistoryRequest) returns (ClearPrivateChatHistoryResponse);
}
