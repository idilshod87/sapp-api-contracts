// ── task-069: Reactions / Pins / Forward / Copy / Unread / Message lookup ─────
// Surface ported from server messaging.proto so the contract is the single source
// of truth (ADR-0051). Entity ids use sapp.common.v1.Uuid (ADR-0049).

message TextEntityProto {
  int32 type = 1; // TextEntityType enum value
  int32 offset = 2;
  int32 length = 3;
  string url = 4; // optional, for Link
  sapp.common.v1.Uuid user_id = 5; // optional, for Mention
}

// ForwardedFromProto — forward provenance carried inside ChatMessageProto.
// Distinct from message_content.proto ForwardFrom (carried on MessageProto / WS payloads).
message ForwardedFromProto {
  sapp.common.v1.Uuid chat_id = 1;
  sapp.common.v1.Uuid message_id = 2;
  sapp.common.v1.Uuid sender_id = 3; // unset when anonymous forward
  int64 forwarded_at_unix_ms = 4;
}

// ChatMessageProto — full message used by GetMessage(s) / GetRepliedMessage / GetPinnedMessage.
message ChatMessageProto {
  sapp.common.v1.Uuid message_id = 1;
  sapp.common.v1.Uuid chat_id = 2;
  sapp.common.v1.Uuid sender_id = 3;
  int64 sent_at_unix_ms = 4;
  string text = 5;
  repeated TextEntityProto entities = 6;
  sapp.common.v1.Uuid reply_to_message_id = 7; // unset if none
  string quoted_text = 8; // empty if none
  int64 edited_at_unix_ms = 9; // 0 if not edited
  int64 deleted_at_unix_ms = 10; // 0 if not deleted
  bool is_deleted = 11;
  ForwardedFromProto forwarded_from = 12; // unset if not forwarded
  optional MessageContent content_typed = 13; // task-067 typed content
}

message ReactionProto {
  string emoji = 1;
  int32 count = 2;
  bool chosen = 3;
}

message AvailableReactionProto {
  string emoji = 1;
  bool chosen = 2;
}

message ReactionUserProto {
  sapp.common.v1.Uuid user_id = 1;
  int64 reacted_at_unix_ms = 2;
}

message ChatUnreadEntryProto {
  sapp.common.v1.Uuid chat_id = 1;
  int32 unread_count = 2;
  bool has_more_unread = 3;
}

// DeleteMessages — batch delete (server surface; supersedes singular DeleteMessage).
message DeleteMessagesRequest {
  sapp.common.v1.Uuid chat_id = 1;
  repeated sapp.common.v1.Uuid message_ids = 2; // up to 50
  bool for_all = 3; // Phase 1: must be true
}
message DeleteMessagesResponse {
  int32 deleted_count = 1;
  int32 skipped_count = 2;
}

message GetChatUnreadRequest {
  sapp.common.v1.Uuid chat_id = 1;
}
message GetChatUnreadResponse {
  sapp.common.v1.Uuid chat_id = 1;
  int32 unread_count = 2;
  bool has_more_unread = 3;
}

message GetTotalUnreadRequest {}
message GetTotalUnreadResponse {
  int32 total_unread_count = 1;
  int32 unread_chat_count = 2;
  repeated ChatUnreadEntryProto per_chat = 3;
}

message GetMessageRequest {
  sapp.common.v1.Uuid chat_id = 1;
  sapp.common.v1.Uuid message_id = 2;
}
message GetMessageResponse {
  ChatMessageProto message = 1;
}

message GetMessagesRequest {
  sapp.common.v1.Uuid chat_id = 1;
  repeated sapp.common.v1.Uuid message_ids = 2; // 1..100, deduplicated server-side
}
message GetMessagesResponse {
  repeated ChatMessageProto messages = 1; // order NOT guaranteed; map by message_id
  int32 requested_count = 2;
  int32 found_count = 3;
}

message GetRepliedMessageRequest {
  sapp.common.v1.Uuid chat_id = 1;
  sapp.common.v1.Uuid message_id = 2;
}
message GetRepliedMessageResponse {
  ChatMessageProto message = 1;
}

message AddReactionRequest {
  sapp.common.v1.Uuid chat_id = 1;
  sapp.common.v1.Uuid message_id = 2;
  string emoji = 3;
}
message AddReactionResponse {
  sapp.common.v1.Uuid message_id = 1;
  string emoji = 2;
  int64 reacted_at_unix_ms = 3;
}

message RemoveReactionRequest {
  sapp.common.v1.Uuid chat_id = 1;
  sapp.common.v1.Uuid message_id = 2;
  string emoji = 3;
}
message RemoveReactionResponse {
  bool ok = 1;
}

message GetMessageReactionsRequest {
  sapp.common.v1.Uuid chat_id = 1;
  sapp.common.v1.Uuid message_id = 2;
}
message GetMessageReactionsResponse {
  repeated ReactionProto reactions = 1; // grouped per emoji; count DESC, emoji ASC
}

message GetAvailableReactionsRequest {
  sapp.common.v1.Uuid chat_id = 1;
  sapp.common.v1.Uuid message_id = 2;
}
message GetAvailableReactionsResponse {
  repeated AvailableReactionProto reactions = 1;
}

message GetMessageReactionUsersRequest {
  sapp.common.v1.Uuid chat_id = 1;
  sapp.common.v1.Uuid message_id = 2;
  string emoji = 3;
  int32 page_size = 4; // 1..100; 0 → 20
  string page_token = 5;
}
message GetMessageReactionUsersResponse {
  repeated ReactionUserProto users = 1;
  string next_page_token = 2;
}

message PinMessageRequest {
  sapp.common.v1.Uuid chat_id = 1;
  sapp.common.v1.Uuid message_id = 2;
}
message PinMessageResponse {
  sapp.common.v1.Uuid chat_id = 1;
  sapp.common.v1.Uuid message_id = 2;
  int64 pinned_at_unix_ms = 3;
  bool replaced = 4;
}

message UnpinMessageRequest {
  sapp.common.v1.Uuid chat_id = 1;
  sapp.common.v1.Uuid message_id = 2;
}
message UnpinMessageResponse {
  bool unpinned = 1;
}

message UnpinAllMessagesRequest {
  sapp.common.v1.Uuid chat_id = 1;
}
message UnpinAllMessagesResponse {
  int32 unpinned_count = 1;
}

message GetPinnedMessageRequest {
  sapp.common.v1.Uuid chat_id = 1;
}
message GetPinnedMessageResponse {
  ChatMessageProto message = 1; // unset when no active pin
}

message ForwardFailureProto {
  sapp.common.v1.Uuid source_message_id = 1;
  string reason = 2; // not_found | content_error | internal_error
}
message ForwardMessagesRequest {
  sapp.common.v1.Uuid from_chat_id = 1;
  sapp.common.v1.Uuid to_chat_id = 2;
  repeated sapp.common.v1.Uuid message_ids = 3; // 1..50; order preserved
  bool silent = 4;
  bool no_sender = 5;
}
message ForwardMessagesResponse {
  repeated sapp.common.v1.Uuid forwarded_message_ids = 1; // order preserved
  int32 succeeded_count = 2;
  int32 failed_count = 3;
  repeated ForwardFailureProto failures = 4;
}

message CopyMessageRequest {
  sapp.common.v1.Uuid from_chat_id = 1;
  sapp.common.v1.Uuid to_chat_id = 2;
  sapp.common.v1.Uuid message_id = 3;
}
message CopyMessageResponse {
  sapp.common.v1.Uuid copied_message_id = 1;
  int64 sent_at_unix_ms = 2;
}

// ── MessagingService ──────────────────────────────────────────────────────────

service MessagingService {
  rpc SendMessage(SendMessageRequest) returns (SendMessageResponse);
  rpc GetChatHistory(GetChatHistoryRequest) returns (GetChatHistoryResponse);
  rpc EditMessageText(EditMessageTextRequest) returns (EditMessageTextResponse);
  rpc DeleteMessage(DeleteMessageRequest) returns (DeleteMessageResponse);
  rpc MarkRead(MarkReadRequest) returns (MarkReadResponse);
  rpc GetChats(GetChatsRequest) returns (GetChatsResponse);
  rpc Sync(SyncRequest) returns (stream SyncEvent);
  rpc CreateDirectChat(CreateDirectChatRequest) returns (CreateDirectChatResponse);
  rpc GetChat(GetChatRequest) returns (GetChatResponse);
  rpc OpenChat(OpenChatRequest) returns (OpenChatResponse);
  rpc CloseChat(CloseChatRequest) returns (CloseChatResponse);
  // task-052: Chat action RPCs
  rpc PinChat(PinChatRequest) returns (PinChatResponse);
  rpc UnpinChat(UnpinChatRequest) returns (UnpinChatResponse);
  rpc ArchiveChat(ArchiveChatRequest) returns (ArchiveChatResponse);
  rpc UnarchiveChat(UnarchiveChatRequest) returns (UnarchiveChatResponse);
  rpc MuteChat(MuteChatRequest) returns (MuteChatResponse);
  rpc UnmuteChat(UnmuteChatRequest) returns (UnmuteChatResponse);
  rpc SetDraft(SetDraftRequest) returns (SetDraftResponse);
  rpc ClearDraft(ClearDraftRequest) returns (ClearDraftResponse);
  rpc DeletePrivateChat(DeletePrivateChatRequest) returns (DeletePrivateChatResponse);
  rpc ClearPrivateChatHistory(ClearPrivateChatHistoryRequest) returns (ClearPrivateChatHistoryResponse);
  // task-055 / ADR-0044: unread tracking amendments
  rpc ReadMention(ReadMentionRequest) returns (ReadMentionResponse);
  rpc MarkChatAsUnread(MarkChatAsUnreadRequest) returns (MarkChatAsUnreadResponse);

  // task-069 / ADR-0051: message-core surface ported to the contract (single source of truth)
  rpc DeleteMessages(DeleteMessagesRequest) returns (DeleteMessagesResponse);
  rpc GetChatUnread(GetChatUnreadRequest) returns (GetChatUnreadResponse);
  rpc GetTotalUnread(GetTotalUnreadRequest) returns (GetTotalUnreadResponse);
  rpc GetMessage(GetMessageRequest) returns (GetMessageResponse);
  rpc GetMessages(GetMessagesRequest) returns (GetMessagesResponse);
  rpc GetRepliedMessage(GetRepliedMessageRequest) returns (GetRepliedMessageResponse);
  rpc AddReaction(AddReactionRequest) returns (AddReactionResponse);
  rpc RemoveReaction(RemoveReactionRequest) returns (RemoveReactionResponse);
  rpc GetMessageReactions(GetMessageReactionsRequest) returns (GetMessageReactionsResponse);
  rpc GetAvailableReactions(GetAvailableReactionsRequest) returns (GetAvailableReactionsResponse);
  rpc GetMessageReactionUsers(GetMessageReactionUsersRequest) returns (GetMessageReactionUsersResponse);
  rpc PinMessage(PinMessageRequest) returns (PinMessageResponse);
  rpc UnpinMessage(UnpinMessageRequest) returns (UnpinMessageResponse);
  rpc UnpinAllMessages(UnpinAllMessagesRequest) returns (UnpinAllMessagesResponse);
  rpc GetPinnedMessage(GetPinnedMessageRequest) returns (GetPinnedMessageResponse);
  rpc ForwardMessages(ForwardMessagesRequest) returns (ForwardMessagesResponse);
  rpc CopyMessage(CopyMessageRequest) returns (CopyMessageResponse);

  // task-059: Group RPCs — 06-groups.md (20 core + 1 Phase 2+)
  rpc CreateGroup(CreateGroupRequest) returns (CreateGroupResponse);
  rpc UpdateGroup(UpdateGroupRequest) returns (UpdateGroupResponse);
  rpc DeleteGroup(DeleteGroupRequest) returns (DeleteGroupResponse);
  rpc LeaveGroup(LeaveGroupRequest) returns (LeaveGroupResponse);
  rpc GetGroupMembers(GetGroupMembersRequest) returns (GetGroupMembersResponse);
  rpc SearchGroupMembers(SearchGroupMembersRequest) returns (SearchGroupMembersResponse);
  rpc AddGroupMembers(AddGroupMembersRequest) returns (AddGroupMembersResponse);
  rpc RemoveGroupMember(RemoveGroupMemberRequest) returns (RemoveGroupMemberResponse);
  rpc SetMemberStatus(SetMemberStatusRequest) returns (SetMemberStatusResponse);
  rpc GetGroupAdmins(GetGroupAdminsRequest) returns (GetGroupAdminsResponse);
  rpc SetGroupUsername(SetGroupUsernameRequest) returns (SetGroupUsernameResponse);
  rpc SetGroupPermissions(SetGroupPermissionsRequest) returns (SetGroupPermissionsResponse);
  rpc SetSlowMode(SetSlowModeRequest) returns (SetSlowModeResponse);
  rpc ToggleHistoryVisible(ToggleHistoryVisibleRequest) returns (ToggleHistoryVisibleResponse);
  rpc ToggleHideMembers(ToggleHideMembersRequest) returns (ToggleHideMembersResponse);
  rpc GetJoinRequests(GetJoinRequestsRequest) returns (GetJoinRequestsResponse); // shared: Groups + Channels
  rpc ProcessJoinRequest(ProcessJoinRequestRequest) returns (ProcessJoinRequestResponse); // shared: Groups + Channels
  rpc ProcessAllJoinReqs(ProcessAllJoinReqsRequest) returns (ProcessAllJoinReqsResponse); // Groups only
  rpc DeleteMemberMessages(DeleteMemberMessagesRequest) returns (DeleteMemberMessagesResponse);
  rpc ReportMessage(ReportMessageRequest) returns (ReportMessageResponse);
  rpc ToggleAntiSpam(ToggleAntiSpamRequest) returns (ToggleAntiSpamResponse); // Phase 2+

  // task-059: Channel RPCs — 07-channels.md (11 core + 2 Phase 2+)
  rpc CreateChannel(CreateChannelRequest) returns (CreateChannelResponse);
  rpc UpdateChannel(UpdateChannelRequest) returns (UpdateChannelResponse);
  rpc DeleteChannel(DeleteChannelRequest) returns (DeleteChannelResponse);
  rpc SubscribeChannel(SubscribeChannelRequest) returns (SubscribeChannelResponse);
  rpc UnsubscribeChannel(UnsubscribeChannelRequest) returns (UnsubscribeChannelResponse);
  rpc GetChannelSubscribers(GetChannelSubscribersRequest) returns (GetChannelSubscribersResponse);
  rpc GetChannelAdmins(GetChannelAdminsRequest) returns (GetChannelAdminsResponse);
  rpc SetChannelAdmin(SetChannelAdminRequest) returns (SetChannelAdminResponse);
  rpc RemoveChannelAdmin(RemoveChannelAdminRequest) returns (RemoveChannelAdminResponse);
  rpc ToggleChannelSigning(ToggleChannelSigningRequest) returns (ToggleChannelSigningResponse);
  rpc ToggleJoinByRequest(ToggleJoinByRequestRequest) returns (ToggleJoinByRequestResponse);
  rpc GetChannelStatistics(GetChannelStatisticsRequest) returns (GetChannelStatisticsResponse); // Phase 2+
  rpc SetDiscussionGroup(SetDiscussionGroupRequest) returns (SetDiscussionGroupResponse); // Phase 2+

  // task-059: Invite Links RPCs — 06b-invite-links.md (11)
  rpc GetPrimaryInviteLink(GetPrimaryInviteLinkRequest) returns (GetPrimaryInviteLinkResponse);
  rpc ReplacePrimaryInviteLink(ReplacePrimaryInviteLinkRequest) returns (ReplacePrimaryInviteLinkResponse);
  rpc GetInviteLinks(GetInviteLinksRequest) returns (GetInviteLinksResponse);
  rpc GetInviteLink(GetInviteLinkRequest) returns (GetInviteLinkResponse);
  rpc CreateInviteLink(CreateInviteLinkRequest) returns (CreateInviteLinkResponse);
  rpc EditInviteLink(EditInviteLinkRequest) returns (EditInviteLinkResponse);
  rpc RevokeInviteLink(RevokeInviteLinkRequest) returns (RevokeInviteLinkResponse);
  rpc DeleteRevokedLinks(DeleteRevokedLinksRequest) returns (DeleteRevokedLinksResponse);
  rpc GetInviteLinkMembers(GetInviteLinkMembersRequest) returns (GetInviteLinkMembersResponse);
  rpc CheckInviteLink(CheckInviteLinkRequest) returns (CheckInviteLinkResponse);
  rpc JoinByInviteLink(JoinByInviteLinkRequest) returns (JoinByInviteLinkResponse);
}
