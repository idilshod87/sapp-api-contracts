syntax = "proto3";

package sapp.events.v1;

import "sapp/common/v1/common.proto";

option csharp_namespace = "Sapp.Events.V1";
option java_multiple_files = true;
option java_outer_classname = "ChatEventsProto";
option java_package = "com.sapp.events.v1";

enum ChatType {
  CHAT_TYPE_UNSPECIFIED = 0;
  CHAT_TYPE_DIRECT = 1;
  CHAT_TYPE_GROUP = 2;
  CHAT_TYPE_CHANNEL = 3;
}

// ChatCreatedPayload — event_type = "chat.created".
// title: absent for Direct; required for Group/Channel.
message ChatCreatedPayload {
  sapp.common.v1.Uuid chat_id = 1;
  sapp.common.v1.Uuid initiator_id = 2;
  ChatType chat_type = 3;
  repeated sapp.common.v1.Uuid member_ids = 4;
  int64 created_at_unix_ms = 5;
  optional string title = 6;
  reserved 7 to 19;
}

// task-052: event_type = "chat.deleted" — delivered to all DM participants.
message ChatDeletedPayload {
  string chat_id = 1;
}

// task-052: event_type = "chat.history_cleared" — delivered to all DM participants.
message ChatHistoryClearedPayload {
  string chat_id = 1;
  int64 cleared_at_unix_ms = 2;
}

// task-053/task-055: event_type = "chat.read_inbox" — delivered to the user's own ws:user:{userId} channel.
// Enables multi-device sync: Device B updates local unread_count + last_read_inbox_message_id.
// RequiresPts=true (ADR-0044: ordered delivery for gap detection).
// Field 3 renamed from last_read_message_id → last_read_inbox_message_id (wire-compatible; same field number).
message ChatReadPayload {
  string chat_id = 1; // UUID string
  int32 unread_count = 2; // current count for the user; 0 = all read
  string last_read_inbox_message_id = 3; // UUIDv7 string — Device B updates local Room last_read
}

// task-055 / ADR-0044: event_type = "chat.mention_read" — delivered to the user's own ws:user:{userId} channel.
// Signals that the user read an @mention in a specific chat; secondary devices clear the mention badge.
// RequiresPts=true (gap detection needed for reliable multi-device sync).
message ChatMentionReadPayload {
  string chat_id = 1; // UUID string — chat where the mention was read
  string message_id = 2; // UUIDv7 string — mentioned message
}

// task-055 / ADR-0044: event_type = "chat.marked_unread" — delivered to the user's own ws:user:{userId} channel.
// Signals that the user toggled the "marked as unread" flag for a chat.
// RequiresPts=true (gap detection for reliable multi-device sync).
// NOTE: server does NOT persist this state — client-side only (ADR-0044 §Phase 1 limitation).
message ChatMarkedUnreadPayload {
  string chat_id = 1; // UUID string
  bool is_marked_unread = 2; // true = marked, false = unmarked
}

// task-054 / ADR-0045: event_type = "chat.read_outbox" — delivered to the *sender* of read messages.
// Enables double-checkmark: User A sees ✓✓ when User B reads A's messages.
// RequiresPts=true (gap-detection needed for reliable delivery to the recipient).
// Routed via WsEventEnvelope.target_user_id to ws:user:{read_by_user_id's peer}.
message ChatReadOutboxPayload {
  string chat_id = 1; // UUID string — the chat where MarkRead was called
  string read_by_user_id = 2; // UUID string — user who called MarkRead (initiator)
  string last_read_message_id = 3; // UUIDv7 string — highest message ID that was read
}

// task-062: event_type = "chat.updated" — delivered to all group members when group settings change.
// RequiresPts=false: settings changes are not ordered/gap-detected; last-write-wins on the client.
// Only the changed field(s) are set; absent fields = not changed in this event.
message ChatUpdatedPayload {
  string chat_id = 1; // UUID string
  optional string name = 2;
  optional string description = 3;
  optional string username = 4; // empty = username removed
  optional bool is_public = 5;
  optional int32 slow_mode_delay = 6;
  optional bool history_visible = 7;
  optional bool members_hidden = 8;
  optional GroupPermissionsPayload default_permissions = 9;
  optional bool signing_enabled = 10; // CHANNEL signing toggle (task-066/089)
  reserved 11 to 19;
}

// Embedded within ChatUpdatedPayload when group default member permissions change.
message GroupPermissionsPayload {
  bool can_send_messages = 1;
  bool can_send_media = 2;
  bool can_add_members = 3;
  bool can_pin_messages = 4;
}

// task-063: event_type = "join_request.new" — pushed to chat admins only when a new join request arrives.
// RequiresPts=false: one-shot admin notification; no gap detection needed.
message JoinRequestNewPayload {
  string chat_id = 1; // UUID string
  string user_id = 2; // UUID string — the applicant
  int64 requested_at_unix_ms = 3;
  reserved 4 to 9;
}

// task-063: event_type = "join_request.processed" — targeted to the applicant when the request is approved/rejected.
// RequiresPts=false: one-shot notification.
message JoinRequestProcessedPayload {
  string chat_id = 1; // UUID string
  bool approved = 2; // true = approved, false = rejected
  reserved 3 to 9;
}

// task-063: event_type = "chat.member_joined" — broadcast to all members when a join request is approved.
// RequiresPts=false: one-shot notification.
message ChatMemberJoinedPayload {
  string chat_id = 1; // UUID string
  string user_id = 2; // UUID string — the newly joined member
  int64 joined_at_unix_ms = 3;
  reserved 4 to 9;
}

// task-076: event_type = "member.added" — fanned out to all current group/channel members when a
// member is added (AddGroupMembers, channel subscribe, approved join request).
// RequiresPts=true (ADR-0044): membership changes chat state; gap detection required.
message MemberAddedPayload {
  sapp.common.v1.Uuid chat_id = 1;
  sapp.common.v1.Uuid user_id = 2; // the added member
  sapp.common.v1.Uuid added_by = 3; // actor (or the member itself for a self-subscribe / invite-link join)
  int32 role = 4; // MemberRole (Creator=1, Admin=2, Member=3, Restricted=4, Banned=5)
  optional string invite_link_url = 5; // task-064: present when the member joined via an invite link
  reserved 6 to 15;
}

// task-076: event_type = "member.removed" — fanned out to all remaining members AND to the
// removed/left member itself (so their client removes the chat / multi-device sync of the leave).
// RequiresPts=true (ADR-0044): membership changes chat state; gap detection required.
message MemberRemovedPayload {
  sapp.common.v1.Uuid chat_id = 1;
  sapp.common.v1.Uuid user_id = 2; // the removed / left member
  sapp.common.v1.Uuid removed_by = 3; // actor for a kick; the member itself for a leave/unsubscribe
  MemberRemovalReason reason = 4;
  reserved 5 to 15;
}

// task-076: why a member was removed. LEFT/KICKED are produced today; BANNED (value 3) is reserved —
// the ban-removal WS push is tracked in task-079.
enum MemberRemovalReason {
  MEMBER_REMOVAL_REASON_UNSPECIFIED = 0;
  MEMBER_REMOVAL_REASON_LEFT = 1; // voluntary leave / channel unsubscribe
  MEMBER_REMOVAL_REASON_KICKED = 2; // removed by an admin/creator
  reserved 3; // BANNED — task-079 (ban-removal WS push)
  reserved "MEMBER_REMOVAL_REASON_BANNED";
}

// task-065 / ADR-0046 Variant A': cross-service fan-out event Messaging → WsGateway.
// NF-03: the live Kafka wire contract is the hand-written C# IntegrationEvent
// (Sapp.Messaging.IntegrationEvents.GroupMessageDeliveryEvent, JSON). This message documents that
// contract for cross-team visibility; it is NOT fed through Grpc.Tools codegen in sapp-applications.
// Chunk size <= 5 000 target_user_ids; one event per batch of online members.
message GroupMessageDeliveryEvent {
  string chat_id = 1;
  string message_id = 2;
  string sender_user_id = 3; // already excluded from target_user_ids (echo filter)
  int64 sent_at_unix_ms = 4;
  repeated string target_user_ids = 5;
  string text = 6; // may be empty for media-only messages
  // NF-02: media snapshot so WsGateway builds a complete message.new for group media messages.
  GroupMessageMediaSnapshot media = 7;
  // task-088 (BD-03): sender display name resolved once per message by the fan-out producer
  // (encode-once, ADR-0054); empty = unknown. DeliveryGateway copies it into MessageNewPayload.sender_display_name.
  string sender_display_name = 8;
}

// Mirrors Sapp.Messaging.IntegrationEvents.MediaSnapshotDto (ADR-0049). Documentation only (NF-03).
message GroupMessageMediaSnapshot {
  string media_id = 1;
  int32 media_type = 2; // 1=Photo 2=Video 3=VoiceNote 4=Document 5=Audio
  int64 size_bytes = 3;
  string content_type = 4;
  string checksum_sha256 = 5;
  int32 snapshot_version = 6;
}
