syntax = "proto3";

package sapp.events.v1;

option java_package = "com.sapp.events.v1";
option java_multiple_files = true;
option java_outer_classname = "ChatEventsProto";

import "sapp/common/v1/common.proto";

enum ChatType {
  CHAT_TYPE_UNSPECIFIED = 0;
  CHAT_TYPE_DIRECT      = 1;
  CHAT_TYPE_GROUP       = 2;
  CHAT_TYPE_CHANNEL     = 3;
}

// ChatCreatedPayload — event_type = "chat.created".
// title: absent for Direct; required for Group/Channel.
message ChatCreatedPayload {
  sapp.common.v1.Uuid           chat_id            = 1;
  sapp.common.v1.Uuid           initiator_id       = 2;
  ChatType                      chat_type          = 3;
  repeated sapp.common.v1.Uuid member_ids          = 4;
  int64                         created_at_unix_ms = 5;
  optional string               title              = 6;
  reserved 7 to 19;
}

// task-052: event_type = "chat.deleted" — delivered to all DM participants.
message ChatDeletedPayload {
  string chat_id = 1;
}

// task-052: event_type = "chat.history_cleared" — delivered to all DM participants.
message ChatHistoryClearedPayload {
  string chat_id            = 1;
  int64  cleared_at_unix_ms = 2;
}

// task-053: event_type = "chat.read" — delivered to the user's own ws:user:{userId} channel.
// Enables multi-device sync: Device B updates local unread_count + last_read_inbox_message_id.
// RequiresPts=false (ephemeral counter update).
message ChatReadPayload {
  string chat_id              = 1;  // UUID string
  int32  unread_count         = 2;  // current count for the user; 0 = all read
  string last_read_message_id = 3;  // UUIDv7 string — Device B updates local Room last_read
}

// task-054 / ADR-0045: event_type = "chat.read_outbox" — delivered to the *sender* of read messages.
// Enables double-checkmark: User A sees ✓✓ when User B reads A's messages.
// RequiresPts=true (gap-detection needed for reliable delivery to the recipient).
// Routed via WsEventEnvelope.target_user_id to ws:user:{read_by_user_id's peer}.
message ChatReadOutboxPayload {
  string chat_id              = 1;  // UUID string — the chat where MarkRead was called
  string read_by_user_id      = 2;  // UUID string — user who called MarkRead (initiator)
  string last_read_message_id = 3;  // UUIDv7 string — highest message ID that was read
}
