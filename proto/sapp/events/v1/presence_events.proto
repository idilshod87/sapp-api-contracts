syntax = "proto3";

package sapp.events.v1;

import "sapp/common/v1/common.proto";

option csharp_namespace = "Sapp.Events.V1";
option java_multiple_files = true;
option java_outer_classname = "PresenceEventsProto";
option java_package = "com.sapp.events.v1";

enum PresenceStatus {
  PRESENCE_STATUS_UNSPECIFIED = 0;
  PRESENCE_STATUS_ONLINE = 1;
  PRESENCE_STATUS_OFFLINE = 2;
  PRESENCE_STATUS_RECENTLY = 3;
  PRESENCE_STATUS_LAST_WEEK = 4;
  PRESENCE_STATUS_LAST_MONTH = 5;
}

// PresenceChangedPayload — event_type = "presence.changed".
// last_seen_unix_ms: absent = unknown. Explicit 0 = never seen (epoch).
message PresenceChangedPayload {
  sapp.common.v1.Uuid user_id = 1;
  PresenceStatus status = 2;
  optional int64 last_seen_unix_ms = 3;
  reserved 4 to 19;
}
