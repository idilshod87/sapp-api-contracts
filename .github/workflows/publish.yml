name: Publish Packages

on:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      # lint: true — debt rules excepted in buf.yaml (see pr-validate.yml). breaking stays off on the
      # publish/push path by design (NL-03): the wire-compat gate lives in pr-validate.yml (PR→main);
      # publish only builds/publishes the already-merged-and-gated contract.
      - uses: bufbuild/buf-action@v1
        with:
          version: '1.35.0'
          lint: true
          breaking: false
          format: true

  auto-tag:
    needs: [validate]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
      - name: Bump version and push tag
        id: tag
        run: |
          set -euo pipefail
          # Highest semver tag across the whole repo. NOT `git describe --tags`, which returns the
          # nearest tag *reachable from HEAD* — when a prior tag wasn't an ancestor of HEAD it returned
          # a stale latest, causing the next version to collide with an already-published one (the tag
          # got moved + the same NuGet version was re-published with new content — immutability break).
          LATEST=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -1)
          LATEST=${LATEST:-v0.0.0}
          VERSION=${LATEST#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          # Range from the latest real tag; on the first-ever run (no tags) scan full history.
          if git rev-parse -q --verify "refs/tags/${LATEST}" >/dev/null; then
            COMMITS=$(git log "${LATEST}..HEAD" --pretty=format:"%s")
          else
            COMMITS=$(git log HEAD --pretty=format:"%s")
          fi
          if echo "$COMMITS" | grep -qE "(^(feat|fix|refactor|build|ci|chore|docs|style|test|perf)!)|BREAKING CHANGE"; then
            MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0
          elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?:"; then
            MINOR=$((MINOR+1)); PATCH=0
          else
            PATCH=$((PATCH+1))
          fi
          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          # Immutability guard: never move or overwrite an existing tag/version.
          if git rev-parse -q --verify "refs/tags/${NEW_TAG}" >/dev/null; then
            echo "::error::Computed tag ${NEW_TAG} already exists — refusing to overwrite (version immutability). Latest seen: ${LATEST}."
            exit 1
          fi
          echo "Latest=${LATEST} → New=${NEW_TAG}"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

  publish-android:
    needs: [auto-tag]
    if: needs.auto-tag.outputs.new_tag != ''
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - uses: bufbuild/buf-action@v1
        with:
          version: '1.35.0'
          setup_only: true

      - name: Cache gRPC protoc plugins
        uses: actions/cache@v4
        with:
          path: /tmp/grpc-plugins
          key: grpc-plugins-protoc-25.3-java-1.65.0-kotlin-1.4.1

      - name: Install protoc + gRPC plugins
        run: |
          mkdir -p /tmp/grpc-plugins

          # protoc 25.3 — matches protobuf-javalite:3.25.3 in build.gradle.kts
          if [ ! -f /tmp/grpc-plugins/protoc ]; then
            curl -Lo /tmp/protoc.zip \
              "https://github.com/protocolbuffers/protobuf/releases/download/v25.3/protoc-25.3-linux-x86_64.zip"
            unzip -o /tmp/protoc.zip -d /tmp/protoc-dist bin/protoc > /dev/null
            cp /tmp/protoc-dist/bin/protoc /tmp/grpc-plugins/protoc
          fi
          sudo install -m 755 /tmp/grpc-plugins/protoc /usr/local/bin/protoc

          if [ ! -f /tmp/grpc-plugins/protoc-gen-grpc-java ]; then
            curl -Lo /tmp/grpc-plugins/protoc-gen-grpc-java \
              "https://repo1.maven.org/maven2/io/grpc/protoc-gen-grpc-java/1.65.0/protoc-gen-grpc-java-1.65.0-linux-x86_64.exe"
          fi
          sudo install -m 755 /tmp/grpc-plugins/protoc-gen-grpc-java /usr/local/bin/protoc-gen-grpc-java

          if [ ! -f /tmp/grpc-plugins/protoc-gen-grpc-kotlin.jar ]; then
            curl -Lo /tmp/grpc-plugins/protoc-gen-grpc-kotlin.jar \
              "https://repo1.maven.org/maven2/io/grpc/protoc-gen-grpc-kotlin/1.4.1/protoc-gen-grpc-kotlin-1.4.1-jdk8.jar"
          fi
          printf '#!/bin/bash\nexec java -jar /tmp/grpc-plugins/protoc-gen-grpc-kotlin.jar "$@"\n' \
            | sudo tee /usr/local/bin/protoc-gen-grpc-kotlin > /dev/null
          sudo chmod +x /usr/local/bin/protoc-gen-grpc-kotlin

      - name: Generate Kotlin stubs
        run: |
          mkdir -p gen/android/src/main/java gen/android/src/main/kotlin
          buf generate --template buf.gen.android.yaml

      - name: Compile and publish
        run: cd gen/android && chmod +x gradlew && ./gradlew publish -Pversion=${{ needs.auto-tag.outputs.new_tag }}
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          MAVEN_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-dotnet:
    needs: [auto-tag]
    if: needs.auto-tag.outputs.new_tag != ''
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: bufbuild/buf-action@v1
        with:
          version: '1.35.0'
          setup_only: true
      - uses: actions/setup-dotnet@v5.3.0
        with:
          dotnet-version: '10.0.x'

      - name: Configure NuGet source
        run: |
          dotnet nuget add source \
            "https://nuget.pkg.github.com/idilshod87/index.json" \
            --name github \
            --username "${{ github.actor }}" \
            --password "${{ secrets.GITHUB_TOKEN }}" \
            --store-password-in-clear-text

      - name: Generate C# stubs
        run: |
          mkdir -p gen/csharp
          buf generate --template buf.gen.dotnet.yaml

      - name: Compile stubs
        run: dotnet build gen/csharp/Sapp.ApiContracts.csproj -c Release

      - name: Pack and publish NuGet
        run: |
          VERSION="${{ needs.auto-tag.outputs.new_tag }}"
          VERSION="${VERSION#v}"
          dotnet pack gen/csharp/Sapp.ApiContracts.csproj \
            -c Release -p:PackageVersion=$VERSION
          NUPKG=$(find . -name "*.nupkg" | head -1)
          dotnet nuget push "$NUPKG" \
            --api-key "${{ secrets.GITHUB_TOKEN }}" \
            --source https://nuget.pkg.github.com/idilshod87/index.json
