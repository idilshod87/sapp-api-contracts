name: PR Validation

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # lint: false — matches publish.yml. buf DEFAULT lint surfaces large pre-existing debt
      #   (ENUM_VALUE_PREFIX on *Proto enums, PACKAGE_SAME_GO_PACKAGE, RPC_RESPONSE_STANDARD_NAME)
      #   unrelated to task-069 — tracked as a separate cleanup.
      # breaking: false — task-069/ADR-0051 is a sanctioned, fully wire-incompatible release
      #   (namespace normalization touches every proto). FOLLOW-UP: re-enable breaking once
      #   main is re-baselined on v1.0.12 (then it compares future PRs against the new baseline).
      - uses: bufbuild/buf-action@v1
        with:
          version: '1.35.0'
          lint: false
          breaking: false
          pr_comment: false

      # task-069 / ADR-0051 §6: every public .proto MUST declare explicit namespace options —
      # csharp_namespace = "Sapp.*.V1" and java_package = "com.sapp.*.v1" WITHOUT a `grpc` infix.
      - name: Guardrail — explicit namespace options
        run: |
          set -euo pipefail
          fail=0
          while IFS= read -r f; do
            if ! grep -qE '^\s*option\s+csharp_namespace\s*=\s*"Sapp\.[A-Za-z0-9]+\.V1"\s*;' "$f"; then
              echo "::error file=$f::missing explicit option csharp_namespace = \"Sapp.<Service>.V1\""
              fail=1
            fi
            if ! grep -qE '^\s*option\s+java_package\s*=\s*"com\.sapp\.[a-z0-9]+\.v1"\s*;' "$f"; then
              echo "::error file=$f::missing/invalid java_package — must be com.sapp.<domain>.v1"
              fail=1
            fi
            if grep -qE '^\s*option\s+java_package\s*=\s*"com\.sapp\.grpc\.' "$f"; then
              echo "::error file=$f::java_package must not contain a 'grpc' infix"
              fail=1
            fi
          done < <(find proto -name '*.proto')
          exit $fail
