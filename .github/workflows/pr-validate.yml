name: PR Validation

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # lint: true — the gate runs for ALL rules except the pre-existing debt (ENUM_VALUE_PREFIX,
      #   PACKAGE_SAME_GO_PACKAGE, RPC_RESPONSE_STANDARD_NAME), excepted in buf.yaml and tracked for
      #   cleanup (task-069 backlog). New violations of every other rule now fail the PR.
      # breaking: true — task-069 A.6 follow-up COMPLETE: v1.0.12 is merged to main, so main is the
      #   new baseline and the temporary breaking.ignore is removed (see buf.yaml). buf-action compares
      #   each PR against its base (main) automatically — the wire-compat gate is strict again.
      - uses: bufbuild/buf-action@v1
        with:
          version: '1.35.0'
          lint: true
          breaking: true
          pr_comment: false

      # task-069 / ADR-0051 §6: every public .proto MUST declare explicit namespace options —
      # csharp_namespace = "Sapp.*.V1" and java_package = "com.sapp.*.v1" WITHOUT a `grpc` infix.
      - name: Guardrail — explicit namespace options
        run: |
          set -euo pipefail
          fail=0
          while IFS= read -r f; do
            if ! grep -qE '^\s*option\s+csharp_namespace\s*=\s*"Sapp\.[A-Za-z0-9]+\.V1"\s*;' "$f"; then
              echo "::error file=$f::missing explicit option csharp_namespace = \"Sapp.<Service>.V1\""
              fail=1
            fi
            if ! grep -qE '^\s*option\s+java_package\s*=\s*"com\.sapp\.[a-z0-9]+\.v1"\s*;' "$f"; then
              echo "::error file=$f::missing/invalid java_package — must be com.sapp.<domain>.v1"
              fail=1
            fi
            if grep -qE '^\s*option\s+java_package\s*=\s*"com\.sapp\.grpc\.' "$f"; then
              echo "::error file=$f::java_package must not contain a 'grpc' infix"
              fail=1
            fi
          done < <(find proto -name '*.proto')
          exit $fail
